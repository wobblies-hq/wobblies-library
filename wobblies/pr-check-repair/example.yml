id: pr-check-repair
title: PR Check Repair
status: ready
summary: Repairs failing GitHub-visible PR checks with focused evidence-grounded commits, flaky reruns, or low-noise blocked comments.
readiness: direct-copy
showOnWebsite: true
showInDashboard: true
fit:
  jobsToBeDone:
    - review-with-confidence
  bestFor:
    - Repositories with active pull request queues and required checks.
    - Teams comfortable with Wobblie pushing narrow check-fix commits to pull request branches.
    - Repositories where failures have useful logs, local reproduction commands, or clear provider data.
  notFor:
    - Teams that do not want automated commits pushed to pull request branches.
    - Checks that usually require product, security, or dependency judgment.
    - Failures caused mostly by external provider configuration, secrets, or environment issues.
requirements:
  requiredIntegrations:
    - github
  optionalIntegrations: []
  other:
    - Access to check logs or provider data.
    - Repository-local verification commands.
specializationIdeas:
  - Restrict repair to selected check names, path areas, or pull request authors.
  - Add repository-specific verification commands for common failure classes.
  - Tune flaky-check rerun behavior for known flaky providers.
