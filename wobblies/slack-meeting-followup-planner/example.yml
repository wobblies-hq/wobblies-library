id: slack-meeting-followup-planner
title: Slack Meeting Follow-up Planner
status: ready
summary: Turns Slack meeting notes or transcripts into concise, repo-aware follow-up options Wobbly can help execute.
readiness: adapt-before-use
showOnWebsite: true
showInDashboard: true
fit:
  jobsToBeDone:
    - plan
    - organize
  bestFor:
    - Teams that share meeting notes, transcripts, or recording summaries in Slack and want concrete follow-up options.
    - Workspaces mapped to repositories where GitHub and Linear context can distinguish new actions from already tracked work.
  notFor:
    - Private, sensitive, social, or status-only conversations where an automated follow-up summary would be inappropriate.
    - Teams that want Wobbly to create issues, edit pull requests, assign owners, or message people without an explicit follow-up request.
requirements:
  requiredIntegrations:
    - slack
    - github
  optionalIntegrations:
    - linear
  other:
    - Slack workspaces are mapped to the repositories discussed in meeting notes.
    - Transcript text, transcript links, or uploaded note files are accessible to Wobbly under the workspace policy.
adaptations:
  - key: slack_channel
    label: Slack meeting notes channel
    description: Slack channel where Wobbly should watch for meeting notes or transcript messages.
    required: true
    suggestions:
      - '#team-meeting-notes'
specializationIdeas:
  - Specialize transcript detection for a team's preferred recorder such as Granola, Fathom, Zoom, or Meet.
  - Tune the follow-up format for planning meetings, incident reviews, or customer calls.
  - Allow issue-creation suggestions to include a preferred Linear project or GitHub issue template.
