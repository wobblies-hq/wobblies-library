id: docs-drift-maintainer
title: Recent Docs Drift Maintainer
status: ready
summary: Runs each weekday to repair docs drift from recent merged source changes with small source-backed PRs.
readiness: direct-copy
showOnWebsite: true
showInDashboard: true
fit:
  jobsToBeDone:
    - document
  bestFor:
    - Repositories where README, API, setup, or runbook docs drift after implementation changes.
    - Teams that want recent documentation updates tied to source changes and verification evidence.
  notFor:
    - Teams looking for this wobblie to perform broad historical stale-documentation cleanup.
    - Repositories where documentation updates require product, legal, or policy decisions.
    - Teams without clear ownership of generated versus hand-authored documentation.
requirements:
  requiredIntegrations:
    - github
  optionalIntegrations: []
  other:
    - Repository documentation and source evidence are accessible through GitHub.
specializationIdeas:
  - Restrict documentation target selection to a specific docs family such as API docs, runbooks, or onboarding docs.
  - Add a repository-specific generated-docs workflow if generated documentation should be updated instead of skipped.
  - Add a docs lint, link check, or preview command when the repository has one.
