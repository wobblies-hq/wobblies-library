id: linear-issue-labeler
title: Issue Label Hygiene Helper
status: ready
summary: Keeps recently changed Linear issues aligned with the current Linear label set.
readiness: direct-copy
showOnWebsite: true
showInDashboard: true
fit:
  jobsToBeDone:
    - organize
    - operate
  bestFor:
    - Teams using Linear labels for routing, reporting, or automation.
    - Workspaces where issue labels drift, conflict, or are often missing.
  notFor:
    - Teams whose Linear label names and descriptions are intentionally ambiguous.
    - Workflows where labels are intentionally ad hoc or owner-specific.
requirements:
  requiredIntegrations:
    - linear
  optionalIntegrations: []
  other:
    - Linear label names and descriptions are available enough to support high-confidence label decisions.
specializationIdeas:
  - Restrict labeling to specific Linear teams or projects.
  - Add explicit label-family rules if the workspace has strict type, area, priority, or source families.
  - Allow safe label removals only after the team documents exact conflict rules.
